<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>The Birthday Show</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="intro">The Birthday Show</div>

<div id="spotlight"></div>

<div id="leftCurtain" class="curtain"></div>
<div id="rightCurtain" class="curtain"></div>

<div id="rope"></div>
<div id="reelWheel"></div>

<div id="instruction">🎀 Pull the rope to begin the show</div>

<div id="stageContent">

<div id="name">Bhavana</div>

<div id="message">🎉 Happy Birthday! 🎉</div>

<div id="cake">
<div class="candle"><div class="flame"></div></div>
<div class="layer layer2"></div>
<div class="layer"></div>
</div>

</div>

<audio id="music">
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="reelSound">
<source src="reel.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

<div id="quote">
"May your life be filled with light, laughter, and endless adventures."
</div>

</body>
</html>
